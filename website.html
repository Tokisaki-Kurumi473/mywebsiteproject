<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations</title>

    body {

      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
    }
    .column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 40px 0;
    }
    .box1, .box2, .box3 {
      width: 700px;
      height: 400px;
      background: linear-gradient(135deg, #740404 0%, #dd8b8b 100%, #aa0505 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-size: 4.5rem;
      font-weight: 500;
      margin: 0;
    }
    h2 {
      font-size: 2.5rem;
      margin: 0 0 10px 0;
    }
    p {
      font-size: 1.5rem;
      margin: 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="column">
    <h1>Congratulations!</h1>
    <div class="box1">
      <h2>Congratulations!</h2>
      <p>yu win pipti milyon dalars</p>
    </div>
    <div class="box2">

</body>
</html>
